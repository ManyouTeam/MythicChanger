# PREMIUM VERSION ONLY
# Require NBTAPI

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.item_skin.name}'
  lore:
    - '{lang:apply_items.item_skin.lore}'
  max-stack: 1

# Rule Configs
real-changes:
  edit-item:
    custom-model-data: 15
  add-nbt-int:
    - 'original_custom_model_data;;{item_custom-model-data;;-1}'
  add-nbt-string:
    - 'used_skin_id;;item_skin'

# Match Item
match-item:
  item-format:
    material: diamond_sword
  item-format-settings:
    require-same-key: false
  not-match-actions:
    1:
      type: message
      message: '{lang:apply_items.item_skin.invalid_type}'

# Conditions
conditions:
  1:
    type: placeholder
    placeholder: '{nbt_used_skin_id;;0}'
    rule: '=='
    value: '0'
    not-meet-actions:
      1:
        type: message
        message: '{lang:apply_items.item_skin.already_applied}'

# Actions
success-actions:
  1:
    type: message
    message: '{lang:apply_items.item_skin.success}'
