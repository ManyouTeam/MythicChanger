# PREMIUM VERSION ONLY

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.item_skin_rollback.name}'
  lore:
    - '{lang:apply_items.item_skin_rollback.lore}'
  max-stack: 1

# Rule Configs
real-changes:
  sub-change-match-one: true
  sub-change:
    1:
      conditions:
        1:
          type: placeholder
          placeholder: '{nbt_original_custom_model_data;;-1}'
          rule: '<'
          value: 0
      changes:
        remove-custom-model-data: true
        remove-nbt:
          - 'original_custom_model_data'
          - 'used_skin_id'
    2:
      conditions:
        1:
          type: placeholder
          placeholder: '{nbt_original_custom_model_data;;-1}'
          rule: '>='
          value: 0
      changes:
        set-custom-model-data: '{nbt_original_custom_model_data;;-1}'
        remove-nbt:
          - 'original_custom_model_data'
          - 'used_skin_id'

# Match Item
match-item:
  item-format:
    material: diamond_sword
  item-format-settings:
    require-same-key: false
  contains-nbt:
    - 'original_custom_model_data'
  not-match-actions:
    1:
      type: message
      message: '{lang:apply_items.item_skin_rollback.invalid_skin}'

# Actions
success-actions:
  1:
    type: message
    message: '{lang:apply_items.item_skin_rollback.success}'
  # Give back the skin item.
  2:
    type: console_command
    command: 'mc giveapplyitem {nbt_used_skin_id} {player}'
