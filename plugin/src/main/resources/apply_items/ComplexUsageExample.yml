# PREMIUM VERSION ONLY

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.complex_usage.name}'
  lore:
    - '{lang:apply_items.common.scroll}'
    - ''
    - '{lang:apply_items.complex_usage.lore_1}'
    - '{lang:apply_items.complex_usage.lore_2}'
    - '{lang:apply_items.complex_usage.lore_3}'
    - '{lang:apply_items.complex_usage.lore_4}'
    - ''
    - '{lang:apply_items.complex_usage.lore_5}'
    - '{lang:apply_items.common.rare}'
  max-stack: 1

chance: 100

# Rule Configs
real-changes:
  sub-change:
    1:
      match-item:
        material:
          - diamond_sword
      changes:
        random-change:
          1:
            add-enchants:
              knockback: 1
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.success}'
            rate: 90
          2:
            empty: true
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.failed}'
            rate: 9
          3:
            set-amount: 0
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.broken}'
            rate: 1
    2:
      match-item:
        material:
          - golden_sword
      changes:
        random-change:
          1:
            add-enchants:
              unbreaking: 1
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.success}'
            rate: 90
          2:
            empty: true
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.failed}'
            rate: 9
          3:
            set-amount: 0
            actions:
              1:
                type: message
                message: '{lang:apply_items.complex_usage.broken}'
            rate: 1

# Match Item
match-item:
  material-tag:
    - 'swords'
