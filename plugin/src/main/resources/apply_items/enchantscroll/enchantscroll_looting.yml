# PREMIUM VERSION ONLY

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.enchant_scroll.looting.name}'
  lore:
    - '{lang:apply_items.common.scroll}'
    - ''
    - '{lang:apply_items.enchant_scroll.drag}'
    - '{lang:apply_items.enchant_scroll.looting.effect}'
    - '{lang:apply_items.enchant_scroll.max_level}'
    - ''
    - '{lang:apply_items.common.success_rate_100}'
    - '{lang:apply_items.common.common}'
  max-stack: 1
  
# Chance, Up to 100
chance: 100
  
# Rule Configs
real-changes:
  add-enchants:
    looting: '{item_enchants.looting;;0} + 1'

# Match Item
match-item:
  enchantable:
    - looting

# Conditions
conditions:
  1:
    type: placeholder
    rule: '<'
    placeholder: '{item_enchants.looting}'
    value: 10
    
# Actions
success-actions:
  1:
    type: message
    message: '{lang:apply_items.common.success}'
fail-actions:
  1:
    type: message
    message: '{lang:apply_items.common.failed}'
