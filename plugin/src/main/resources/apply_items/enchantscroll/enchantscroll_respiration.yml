# PREMIUM VERSION ONLY

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.enchant_scroll.respiration.name}'
  lore:
    - '{lang:apply_items.common.scroll}'
    - ''
    - '{lang:apply_items.enchant_scroll.drag}'
    - '{lang:apply_items.enchant_scroll.respiration.effect}'
    - '{lang:apply_items.enchant_scroll.max_level}'
    - ''
    - '{lang:apply_items.common.success_rate_50}'
    - '{lang:apply_items.common.uncommon}'
  max-stack: 1
  
# Chance, Up to 100
chance: '50'
  
# Rule Configs
real-changes:
  add-enchants:
    respiration: '{item_enchants.respiration;;0} + 1'

# Match Item
match-item:
  enchantable:
    - respiration

# Conditions
conditions:
  1:
    type: placeholder
    rule: '<'
    placeholder: '{item_enchants.respiration}'
    value: 10
    
# Actions
success-actions:
  1:
    type: message
    message: '{lang:apply_items.common.success}'
fail-actions:
  1:
    type: message
    message: '{lang:apply_items.common.failed}'
