apply-item-mode: GENERAL

# Display Item
display-item:
  material: BOOK
  name: '{lang:apply_items.deapply.name}'
  lore:
    - '{lang:apply_items.deapply.lore_1}'
    - '{lang:apply_items.deapply.lore_2}'
  max-stack: 1

# Rule Configs
real-changes:
  deapply: true

# Match Item
match-item:
  has-apply: true
