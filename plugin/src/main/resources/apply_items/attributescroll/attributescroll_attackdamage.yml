# PREMIUM VERSION ONLY

apply-item-mode: GENERAL

# Display Item
display-item:
  material: PAPER
  name: '{lang:apply_items.attribute_scroll.attack_damage.name}'
  lore:
    - '{lang:apply_items.common.scroll}'
    - ''
    - '{lang:apply_items.attribute_scroll.attack_damage.lore_1}'
    - '{lang:apply_items.attribute_scroll.attack_damage.lore_2}'
    - '{lang:apply_items.attribute_scroll.attack_damage.lore_3}'
    - ''
    - '{lang:apply_items.common.success_rate_50}'
    - '{lang:apply_items.common.rare}'
  max-stack: 1
  
# Chance, Up to 100
chance: 50
  
# Rule Configs
real-changes:
  add-attributes:
    ATTACK_DAMAGE: 
      name: attack_damage 
      amount: '0.5'
      operation: ADD_NUMBER 
      slot: HAND 

# Match Item
match-item:
  material-tag:
    - swords

# Conditions
conditions:
  1:
    type: placeholder
    rule: '<'
    placeholder: '{item_attributes.ATTACK_DAMAGE.amount;;0}'
    value: 10
    
# Actions
success-actions:
  1:
    type: message
    message: '{lang:apply_items.common.success}'
fail-actions:
  1:
    type: message
    message: '{lang:apply_items.common.failed}'
