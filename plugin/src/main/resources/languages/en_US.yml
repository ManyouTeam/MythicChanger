error:
  args: "&#98FB98[MythicChanger] &cWrong command usage, if you need help, use /mchanger help!"
  in-game: "&#98FB98[MythicChanger] &cYou have to use this command in game!"
  miss-permission: "&#98FB98[MythicChanger] &cYou don't have permission to use this command!"
  item-not-found: "&#98FB98[MythicChanger] &cWe can't find this apply item called {item}!"
  save-item-not-found: "&#98FB98[MythicChanger] &cWe can't find this save item called {item}!"
  player-not-found: "&#98FB98[MythicChanger] &cWe can't find player {player}!"
  creative-mode: "&#98FB98[MythicChanger] &cThis feature does not support creative mode for now!"
  item-only-one: "&#98FB98[MythicChanger] &cYour apply item can not be stacked to more than 1 amount!"
  item-empty: "&#98FB98[MythicChanger] &cYou are holding empty item!"

command-tab:
  type-item-id: "[Type Item ID you want]"

plugin:
  reloaded: "&#98FB98[MythicChanger] &fPlugin reloaded!"
  saved: "&#98FB98[MythicChanger] &fItem Saved!"
  edited: "&#98FB98[MythicChanger] &fItem edited!"
  item-gave: "&#98FB98[MythicChanger] &aGave {player} apply item {item} x{amount}!"
  generated: "&#98FB98[MythicChanger] &fGenerated hold item's item format at plugin config folder!"

# All messages also support multi lines, just do it like this!
help:
  main: |
    &#98FB98&lMythicChanger &7Made by @PQguanfang
    &f/mythicchanger help &7- View help.
    &f/mythicchanger openchangegui &7- Open Change GUI. &c(Premium, require enable in config.yml)
  main-admin: |
    &#98FB98&lMythicChanger &7Made by @PQguanfang
    &f/mythicchanger help &7- View help.
    &f/mythicchanger generateitemformat &7- Generate Item Format for hold item.
    &f/mythicchanger saveitem <item> &7- Save hold item.
    &f/mythicchanger edititem <name/itemname/lore> <value...> &7- Edit hold item name, item name, or lore.
    &f/mythicchanger givesaveitem <itemID> <player> <amount> &7- Give saved item to players.
    &f/mythicchanger setlimit <amount> &7- Set hold item apply limit. &c(Premium)
    &f/mythicchanger viewapplyrules &7- Check applied apply item rule IDs on hold item.
    &f/mythicchanger viewnbt &7- Check custom NBT data of hold item. &c(Premium)
    &f/mythicchanger openchangegui &7- Open Change GUI. &c(Premium, require enable in config.yml)
    &f/mythicchanger reload &7- Reload the plugin.
    &f/mythicchanger giveapplyitem <item> <player> <amount> &7- Give apply item for specified players.
  main-console: |
    &#98FB98&lMythicChanger &7Made by @PQguanfang
    &f/mythicchanger help &7- View help.
    &f/mythicchanger generateitemformat &7- Generate Item Format for hold item.
    &f/mythicchanger givesaveitem <itemID> <player> <amount> &7- Give saved item to players.
    &f/mythicchanger reload &7- Reload the plugin.
    &f/mythicchanger giveapplyitem <item> <player> <amount> &7- Give apply item for specified players.

give-save-item: "&#98FB98[MythicChanger] &fGive {player} save item {item} x{amount}!"
nbt-view-empty: "&#98FB98[MythicChanger] &fThis item does not has any custom NBT!"
nbt-view: "&#98FB98[MythicChanger] &fThis item has those NBT content:"
apply-rule-view-empty: "&#98FB98[MythicChanger] &fThis item does not have MYTHICCHANGER_APPLY_RULE data!"
apply-rule-view: "&#98FB98[MythicChanger] &fMYTHICCHANGER_APPLY_RULE: &a{rules}"
apply-rule-view-item: "&#98FB98[MythicChanger] &f- &a{rule}"
apply-rule-view-item-missing: "&#98FB98[MythicChanger] &f- &c{rule} &7(config not loaded)"
rule-limit-reached: "&#98FB98[MythicChanger] &fThis item reached it's apply item rule limit!"
do-not-apply: "&#98FB98[MythicChanger] &fThis apply item does not work on this item!"
success-set-limit: "&#98FB98[MythicChanger] &fSuccessfully set this item apply limit to {limit}!"
not-meet-condition: "&#98FB98[MythicChanger] &fYou can't use this item because you didn't meet the condition of the rule the item related to!"
dupe-removed: "&#98FB98[MythicChanger] &fA illegal item from your inventory has been removed!"

