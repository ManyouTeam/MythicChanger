do-not-apply: "&#98FB98[MythicChanger] &f该更改物品无法适用于此物品!"
success-set-limit: "&#98FB98[MythicChanger] &f成功设置更改物品使用上限为 {limit}!"
not-meet-condition: "&#98FB98[MythicChanger] &f您无法使用此更改物品，因为您未满足相关条件!"
